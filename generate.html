<main class="main-container">
  <div class="card">
    <h2>在线生成二维码</h2>
    <div style="margin-bottom: 16px;">
      <label for="textInput" style="display: block; margin-bottom: 8px;">文本内容：</label>

    </div>
    <div style="margin-bottom: 16px;">
      <label style="display: block; margin-bottom: 8px;">二维码预览：</label>
      <div id="qrcode" style="padding: 16px; background-color: #fff; border: 1px solid #ddd; display: inline-block;"></div>
    </div>
    <div style="margin-bottom: 16px;">
      <label style="display: block; margin-bottom: 8px;">尺寸：</label>
      <select id="sizeSelect" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
        <option value="200">200x200</option>
        <option value="300">300x300</option>
        <option value="400">400x400</option>
      </select>
    </div>
    <div style="margin-bottom: 16px;">
      <label style="display: block; margin-bottom: 8px;">颜色：</label>
      <input type="color" id="colorInput" value="#000000" style="width: 100%; padding: 4px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    <div style="margin-bottom: 16px;">
      <label style="display: block; margin-bottom: 8px;">容错率：</label>
      <select id="errorLevelSelect" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
        <option value="L">低 (L)</option>
        <option value="M">中 (M)</option>
        <option value="Q">中高 (Q)</option>
        <option value="H">高 (H)</option>
      </select>
    </div>
    <button class="btn btn-primary" id="downloadBtn" style="width: 100%;">下载二维码</button>
  </div>

<script src="qrcode.min.js"></script>
<script>
  let qrcode = null;
  const textInput = document.getElementById('textInput');
  const sizeSelect = document.getElementById('sizeSelect');
  const colorInput = document.getElementById('colorInput');
  const errorLevelSelect = document.getElementById('errorLevelSelect');
  const downloadBtn = document.getElementById('downloadBtn');
  const qrcodeContainer = document.getElementById('qrcode');

  function generateQRCode() {
    const text = textInput.value || ' ';
    const size = parseInt(sizeSelect.value);
    const color = colorInput.value;
    const errorLevel = errorLevelSelect.value;

    if (qrcode) {
      qrcode.clear();
    }

    qrcode = new QRCode(qrcodeContainer, {
      text: text,
      width: size,
      height: size,
      colorDark: color,
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel[errorLevel]
    });
  }

  textInput.addEventListener('input', generateQRCode);
  sizeSelect.addEventListener('change', generateQRCode);
  colorInput.addEventListener('input', generateQRCode);
  errorLevelSelect.addEventListener('change', generateQRCode);

  downloadBtn.addEventListener('click', () => {
    if (!qrcode) return;
    const canvas = qrcodeContainer.querySelector('canvas');
    if (canvas) {
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'qrcode.png';
      link.click();
    }
  });

  // URL参数预览功能
  const urlParams = new URLSearchParams(window.location.search);
  const previewText = urlParams.get('text');
  if (previewText) {
    textInput.value = previewText;
    generateQRCode();
  } else {
    generateQRCode();
  }

  // 初始化
  generateQRCode();
</script>

<script>
  function toggleMenu() {
    const navMenu = document.getElementById('navMenu');
    navMenu.classList.toggle('active');
  }

  // 点击外部关闭菜单
  document.addEventListener('click', function(e) {
    const navMenu = document.getElementById('navMenu');
    const menuBtn = document.querySelector('.mobile-menu-btn');
    if (!navMenu.contains(e.target) && !menuBtn.contains(e.target)) {
      navMenu.classList.remove('active');
    }
  });

  // 当前页面导航高亮
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-menu a').forEach(link => {
    if (link.getAttribute('href') === currentPage) {
      link.classList.add('active');
    }
  });
</script>
